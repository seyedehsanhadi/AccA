name: release

# Build a signed release APK and publish it as a GitHub Release.
# Triggered by pushing a version tag (v*), or manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17 first — only so the SDK manager (which now requires 17) can run
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK 31 + build-tools
        run: |
          SDKM="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKM" --licenses >/dev/null 2>&1 || true
          "$SDKM" "platforms;android-31" "build-tools;31.0.0" >/dev/null

      # JDK 11 for the actual build (Gradle 7.1.1 + AGP 7.0.3 need 11, not 17)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # Decode the project release keystore from a repo secret so every build
      # is signed with the same key and users can always update in place.
      # Secrets: ACCA_KEYSTORE_BASE64, ACCA_KEYSTORE_PASSWORD, ACCA_KEY_ALIAS, ACCA_KEY_PASSWORD.
      - name: Decode release keystore
        env:
          ACCA_KEYSTORE_BASE64: ${{ secrets.ACCA_KEYSTORE_BASE64 }}
        run: |
          echo "$ACCA_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/acca-release.jks"

      - name: Build release APK
        env:
          ACCA_KEYSTORE_LOCATION: ${{ runner.temp }}/acca-release.jks
          ACCA_KEYSTORE_PASSWORD: ${{ secrets.ACCA_KEYSTORE_PASSWORD }}
          ACCA_KEY_ALIAS: ${{ secrets.ACCA_KEY_ALIAS }}
          ACCA_KEY_PASSWORD: ${{ secrets.ACCA_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          echo "Found APK: $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: AccA-release
          path: app/build/outputs/apk/release/*.apk

      # Pull the notes for this version out of CHANGELOG.md so the release page
      # and the repo changelog never drift apart.
      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "AccA $GITHUB_REF_NAME" > release_notes.md
          fi
          printf '\n---\nAPK below is built by GitHub Actions and signed with the project release key, so it updates cleanly over any AccA release from this fork.\n' >> release_notes.md
          cat release_notes.md

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          body_path: release_notes.md
          # tags containing -rc / -pre / -beta publish as a GitHub pre-release;
          # plain version tags (e.g. v1.1.5) publish as a full release.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-pre') || contains(github.ref_name, '-beta') }}
