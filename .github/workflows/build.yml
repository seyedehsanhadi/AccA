name: build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17 first — only so the SDK manager (which now requires 17) can run
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK 31 + build-tools
        run: |
          SDKM="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKM" --licenses >/dev/null 2>&1 || true
          "$SDKM" "platforms;android-31" "build-tools;31.0.0" >/dev/null

      # JDK 11 for the actual build (Gradle 7.1.1 + AGP 7.0.3 need 11, not 17)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: AccA-community-fix-debug
          path: app/build/outputs/apk/debug/*.apk

      # Publish a single rolling pre-release (reuses the "rc3" tag, not a new tag each push)
      # so the APK is downloadable from the Releases page.
      # Refresh the rolling pre-release on the fixed rc3 tag (the tag is reused, not recreated).
      # Step 1: delete the existing release for a clean slate -- clears any stale or half-uploaded
      # "phantom" assets from previous runs. The tag is kept (no --cleanup-tag), so no tag race.
      - name: Clear previous rolling release
        if: github.ref == 'refs/heads/1.1.7-rc2-wip'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete rc3 --yes 2>/dev/null || true

      # Step 2: recreate the release and upload the current APK with the standard release action,
      # which handles the create-then-upload propagation race and asset replacement internally.
      # The hand-rolled gh create/upload path hit transient HTTP 422/404 on the uploads endpoint.
      - name: Publish rolling pre-release
        if: github.ref == 'refs/heads/1.1.7-rc2-wip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rc3
          target_commitish: ${{ github.sha }}
          prerelease: true
          name: "AccA 1.1.7-rc3 (pre-release, debug build)"
          body: "Auto-built debug APK. Verified-switch Apply & Lock, charging-health card, KernelSU path fixes. (Debug-signed; for testing.)"
          files: |
            app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: false
