name: build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17 first — only so the SDK manager (which now requires 17) can run
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK 31 + build-tools
        run: |
          SDKM="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKM" --licenses >/dev/null 2>&1 || true
          "$SDKM" "platforms;android-31" "build-tools;31.0.0" >/dev/null

      # JDK 11 for the actual build (Gradle 7.1.1 + AGP 7.0.3 need 11, not 17)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: AccA-community-fix-debug
          path: app/build/outputs/apk/debug/*.apk

      # Publish a single rolling pre-release (reuses the "rc3" tag, not a new tag each push)
      # so the APK is downloadable from the Releases page.
      - name: Publish rolling pre-release
        if: github.ref == 'refs/heads/1.1.7-rc2-wip'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Refresh the rolling pre-release on the fixed rc3 tag. Delete the release first
          # (keep the tag, so no tag-recreation race) to clear any stale/phantom assets left
          # by earlier failed uploads, then recreate it with the current APK. --clobber proved
          # unreliable: a half-finished upload leaves an asset in GitHub's "starter" state that
          # clobber's dedup won't delete, so re-upload hits HTTP 422.
          gh release delete rc3 --yes 2>/dev/null || true
          assets=""; for f in app/build/outputs/apk/debug/*.apk; do [ -f "$f" ] && assets="$assets $f"; done
          gh release create rc3 $assets --prerelease --target "$GITHUB_SHA" \
            --title "AccA 1.1.7-rc3 (pre-release, debug build)" \
            --notes "Auto-built debug APK. Verified-switch Apply & Lock, charging-health card, KernelSU path fixes. (Debug-signed; for testing.)"
